server:
  host: "127.0.0.1"
  port: 8080

proxy:
  forward_headers:
    - Origin

cors:
  allow_any_origin: true

# Load balancing strategy options:
# - "primary_only": Uses single upstream with highest weight
# - "failover": Tries upstreams by weight (highest first), fails over on:
#     - Connection errors and timeouts
#     - Non-2xx HTTP status codes (e.g., 429, 500, 503)
#     - Invalid JSON-RPC responses
#   Note: Valid RPC error responses (e.g., ExecutionError) do NOT trigger failover
load_balancing:
  strategy: "primary_only"

request_coalescing:
  enabled: true
  # method_filter:
  #   type: "whitelist"
  #   methods:
  #     - eth_call
  #     - eth_getTransactionCount
  #     - eth_getBalance
  #     - eth_getBlockByNumber
  #     - eth_getBlockByHash

upstream_health_checks:
  enabled: true
  interval: "5m"
  # Optional: Mark upstream unhealthy if it's more than N blocks behind the highest
  # block among all upstreams for the chain. Useful for detecting nodes that fall behind.
  # Metrics emitted: upstream_block_height, upstream_block_lag (per upstream)
  # block_height_lag_threshold: 10

metrics:
  enabled: true
  host: "0.0.0.0"
  port: 8082

# error_handling:
#   type: "retry"
#   max_retries: 3
#   retry_delay: "1s"
#   jitter: true
#   # JSON-RPC error codes that should trigger failover to the next upstream.
#   # Recommended codes for failover to archive/backup nodes:
#   #   -32000: Header/block not found (node not synced or data pruned)
#   #   -32001: Resource not found (data unavailable on this node)
#   #   -32002: Resource unavailable (temporarily or permanently)
#   #   -32004: Method not supported (node doesn't implement the method)
#   #   -32603: Internal error (e.g., "state is pruned" from non-archive nodes)
#   # Do NOT include user errors like -32600 (invalid request), -32601 (method not found),
#   # -32602 (invalid params), -32700 (parse error) - these won't work on any node.
#   failover_on_rpc_error_codes:
#     - -32000
#     - -32001
#     - -32002
#     - -32004
#     - -32603
#
# # Or use fail_fast with failover on specific RPC errors:
# error_handling:
#   type: "fail_fast"
#   failover_on_rpc_error_codes:
#     - -32000  # Header/block not found
#     - -32001  # Resource not found
#     - -32002  # Resource unavailable
#     - -32004  # Method not supported
#     - -32603  # Internal error (state is pruned)

cache:
  # type: "disabled"
  type: "local"
  capacity: 10000

logging:
  console:
    enabled: true
    # rust_log: "warn,rpc_gateway_core=info"
    rust_log: "info"
    format: "text"
    include_target: true
    include_thread_ids: true
    include_thread_names: true
    include_file: true
    include_line_number: true
  file:
    # enabled: true
    enabled: false
    # rust_log: "debug,rpc_gateway=debug,actix_server=error,actix_web=error,tracing_actix_web=error,redis=error,tokio=error"
    format: "json"
    path: "logs/rpc-gateway.log"
  #   rotation: "daily"
  #   include_target: true
  #   include_thread_ids: true
  #   include_thread_names: true
  #   include_file: true
  #   include_line_number: true

projects:
  - name: "nodes"

  - name: "web-app"
    key: "$WEB_APP_KEY"

  - name: "loadtest"

chains:
  1:
    upstreams:
      - name: "alchemy"  # optional, defaults to "generic" if not specified
        url: "$ALCHEMY_ETH_MAINNET_URL"
        timeout: "10s"
        weight: 1
  8453:
    upstreams:
      - name: "alchemy"
        url: "$ALCHEMY_BASE_MAINNET_URL"
        timeout: "10s"
        weight: 1
      # - name: "infura"
      #   url: "$INFURA_URL"
      #   timeout: "10s"
      #   weight: 2

  84532:
    upstreams:
      - name: "alchemy"
        url: "$ALCHEMY_BASE_SEPOLIA_URL"
        timeout: "10s"
        weight: 1
